name: Update activities data

on:
  schedule:
    - cron: '0 10 * * *' # daily, ~6am Toronto
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh data from ActiveMississauga
        run: python3 update.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898024+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: Refresh activities data"
            git push
          fi
